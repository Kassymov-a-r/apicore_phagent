<!doctype html><html lang="ru"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>IG Instagram Login Agent</title><style>
:root{--bg:#071024;--panel:#101b38;--muted:#91a0bd;--text:#f5f7ff;--line:#25345d;--brand:#7c5cff;--bad:#ff6b6b;--ok:#25d695}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial;background:var(--bg);color:var(--text)}a{color:inherit}.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{padding:24px;border-right:1px solid #172241;background:#050b1a}.logo{font-weight:800;margin-bottom:30px}.nav button{display:block;width:100%;background:transparent;color:var(--muted);border:0;text-align:left;padding:13px 14px;border-radius:12px;font-weight:700}.nav button.active,.nav button:hover{background:#142044;color:white}.main{padding:28px;max-width:1180px}.row{display:flex;gap:12px;flex-wrap:wrap}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;margin:14px 0}.btn{background:var(--brand);color:white;border:0;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}.btn.secondary{background:#1b2a55}.btn.danger{background:#7c2430}.input,textarea,select{width:100%;background:#07132b;color:white;border:1px solid var(--line);border-radius:12px;padding:12px;margin:6px 0 12px}textarea{min-height:90px}.muted{color:var(--muted)}.pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#0f2e38;color:#5df0c0;border:1px solid #1e655f;font-size:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.hidden{display:none}pre{white-space:pre-wrap;word-break:break-word;background:#061027;border:1px solid var(--line);border-radius:12px;padding:12px}.small{font-size:13px}</style></head><body><div class="app"><aside class="side"><div class="logo">IG Agent<br><span class="muted small">Instagram Login API</span></div><div class="nav"><button class="active" onclick="show('accounts',this)">📱 Аккаунты</button><button onclick="show('rules',this)">⚡ Автоматизации</button><button onclick="show('logs',this)">📜 Логи</button><button onclick="show('debug',this)">🛠 Debug</button></div></aside><main class="main"><section id="accounts"><h1>Аккаунты</h1><p class="muted">Официальный Instagram Login. Без Facebook Page flow.</p><a class="btn" href="/auth/instagram">Продолжить с Instagram</a><div id="accountsList"></div></section><section id="rules" class="hidden"><h1>Автоматизации</h1><div class="card"><h3>Создать правило</h3><label>Аккаунт</label><select id="ruleAccount"></select><label>Название</label><input class="input" id="ruleName" value="Апикор"/><label>Ключевые слова, по одному на строку</label><textarea id="keywords">апикор</textarea><div class="row"><button class="btn secondary" onclick="ai('comment')">AI: ответы на комментарии</button><button class="btn secondary" onclick="ai('dm')">AI: ответы в Direct</button></div><label>Ответы на комментарий, по одному на строку</label><textarea id="publicReplies">Спасибо за комментарий! Написали вам 👌</textarea><label>Ответы в Direct, по одному на строку</label><textarea id="dmReplies">Спасибо за интерес! Вот информация: https://apicore.kz</textarea><button class="btn" onclick="createRule()">Сохранить правило</button></div><div id="rulesList"></div></section><section id="logs" class="hidden"><h1>Логи</h1><button class="btn secondary" onclick="loadLogs()">Обновить</button><div id="logsList"></div></section><section id="debug" class="hidden"><h1>Debug</h1><div class="row"><button class="btn secondary" onclick="debugMeta()">Meta Debug</button><button class="btn secondary" onclick="events()">Webhook Events</button><button class="btn secondary" onclick="matchTest()">Test keyword</button></div><input class="input" id="matchText" value="апикор"/><pre id="debugOut"></pre></section></main></div><script>
const $=s=>document.querySelector(s);function lines(id){return $('#'+id).value.split('\n').map(x=>x.trim()).filter(Boolean)}function show(id,b){document.querySelectorAll('main section').forEach(s=>s.classList.add('hidden'));$('#'+id).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active'); if(id==='accounts')loadAccounts(); if(id==='rules')loadRules(); if(id==='logs')loadLogs();}
async function api(url,opt){const r=await fetch(url,opt);return r.json()}async function loadAccounts(){const d=await api('/api/accounts');$('#accountsList').innerHTML=d.accounts.map(a=>`<div class=card><h2>@${a.username||a.ig_user_id}</h2><div class=muted>IG ID: ${a.ig_user_id}</div><div>Статус: <span class=pill>${a.active?'active':'off'}</span></div><div class=small>Token expires: ${a.token_expires_at||'unknown'}</div><button class="btn danger" onclick="delAccount(${a.id})">Удалить</button></div>`).join('')||'<div class=card>Пока нет аккаунтов</div>'; const sel=$('#ruleAccount'); if(sel){sel.innerHTML=d.accounts.map(a=>`<option value="${a.id}">@${a.username}</option>`).join('')}}
async function delAccount(id){if(!confirm('Удалить аккаунт и связанные правила?'))return;await api('/api/accounts/'+id,{method:'DELETE'});loadAccounts()}async function createRule(){const body={account_id:+$('#ruleAccount').value,name:$('#ruleName').value,keywords:lines('keywords'),public_replies:lines('publicReplies'),dm_replies:lines('dmReplies')};await api('/api/rules',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});loadRules()}async function loadRules(){await loadAccounts();const d=await api('/api/rules');$('#rulesList').innerHTML=d.rules.map(r=>`<div class=card><h3>${r.name} <span class=pill>@${r.username}</span></h3><div>Keywords: ${(r.keywords||[]).join(', ')}</div><button class="btn danger" onclick="delRule(${r.id})">Удалить</button></div>`).join('')||'<div class=card>Правил нет</div>'}async function delRule(id){await api('/api/rules/'+id,{method:'DELETE'});loadRules()}async function loadLogs(){const d=await api('/api/logs');$('#logsList').innerHTML=d.logs.map(l=>`<div class=card><b>${new Date(l.created_at).toLocaleString()}</b> <span class=pill>${l.status}</span><div class=muted>${l.source||''} @${l.username||l.sender_id||'—'}</div><p>${l.text||''}</p><p class=muted>${l.reason||''}</p>${l.response?`<pre>${l.response}</pre>`:''}</div>`).join('')||'<div class=card>Логов нет</div>'}async function debugMeta(){ $('#debugOut').textContent=JSON.stringify(await api('/api/meta/debug'),null,2)}async function events(){ $('#debugOut').textContent=JSON.stringify(await api('/api/webhook/events'),null,2)}async function matchTest(){ $('#debugOut').textContent=JSON.stringify(await api('/api/debug/match?text='+encodeURIComponent($('#matchText').value)),null,2)}async function ai(type){const topic=prompt('О чём ответы?', 'апикор, консультация, ссылка'); if(!topic)return; const d=await api('/api/ai/generate',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({topic,type,count:5,tone:'friendly'})}); if(!d.ok)return alert(d.error); const id=type==='comment'?'publicReplies':'dmReplies'; $('#'+id).value=d.items.join('\n')}loadAccounts();</script></body></html>
