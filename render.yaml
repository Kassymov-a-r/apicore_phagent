services:
  - type: web
    name: ig-playwright-agent
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    disk:
      name: ig-playwright-storage
      mountPath: /app/storage
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: HEADLESS
        value: "true"
      - key: SQLITE_PATH
        value: "/app/storage/data.sqlite"
      - key: PORT
        value: "3000"
      - key: POLL_INTERVAL_MS
        value: "35000"
      - key: MAX_REPLIES_PER_ACCOUNT_PER_HOUR
        value: "12"
