services:
  - type: web
    name: ig-agent-instagram-login-best-practices
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: DATABASE_URL
        fromDatabase:
          name: ig-agent-instagram-login-db
          property: connectionString
      - key: APP_BASE_URL
        sync: false
      - key: INSTAGRAM_CLIENT_ID
        sync: false
      - key: INSTAGRAM_CLIENT_SECRET
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_GRAPH_VERSION
        value: v23.0
      - key: DRY_RUN
        value: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: ig-agent-instagram-login-db
    plan: basic-256mb
