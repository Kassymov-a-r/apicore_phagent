services:
  - type: web
    name: ig-remote-browser-agent
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    disk:
      name: ig-agent-storage
      mountPath: /app/storage
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_DIR
        value: /app/storage
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
